<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Northern Step Studio SMS opt-in workflow</title>
  <desc id="desc">Branded website opt-in example showing mobile phone collection and explicit SMS consent for inquiry follow-up.</desc>
  <rect width="1600" height="1100" fill="#120f16"/>
  <rect x="60" y="60" width="1480" height="980" rx="36" fill="#1d1821" stroke="#3d3345" stroke-width="4"/>
  <text x="120" y="155" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="700">Northern Step Studio</text>
  <text x="120" y="210" fill="#ff8f5a" font-family="Arial, sans-serif" font-size="28" font-weight="700">Lead Recovery / Contact Form SMS Opt-In</text>
  <text x="120" y="265" fill="#cfc6d4" font-family="Arial, sans-serif" font-size="28">Public contact workflow used for setup review, support, and service automation inquiries.</text>

  <rect x="120" y="320" width="1360" height="610" rx="28" fill="#241d2a" stroke="#45394f" stroke-width="3"/>
  <text x="170" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Contact Northern Step Studio</text>
  <text x="170" y="430" fill="#cfc6d4" font-family="Arial, sans-serif" font-size="24">Visitors can request setup review and optionally opt into conversational SMS follow-up.</text>

  <text x="170" y="500" fill="#ffcfb8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Your Name</text>
  <rect x="170" y="520" width="560" height="70" rx="16" fill="#100d14" stroke="#564a61" stroke-width="3"/>
  <text x="200" y="565" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">Winston Martinez</text>

  <text x="780" y="500" fill="#ffcfb8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Your Email</text>
  <rect x="780" y="520" width="560" height="70" rx="16" fill="#100d14" stroke="#564a61" stroke-width="3"/>
  <text x="810" y="565" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">hello@northernstepstudio.com</text>

  <text x="170" y="650" fill="#ffcfb8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Mobile Phone</text>
  <rect x="170" y="670" width="1170" height="70" rx="16" fill="#100d14" stroke="#564a61" stroke-width="3"/>
  <text x="200" y="715" fill="#ffffff" font-family="Arial, sans-serif" font-size="28">+1 (917) 280-9154</text>

  <text x="170" y="780" fill="#cfc6d4" font-family="Arial, sans-serif" font-size="22">Add a mobile number if you want text follow-up for setup review, support, or service automation questions.</text>

  <rect x="170" y="820" width="36" height="36" rx="8" fill="#ff8f5a"/>
  <path d="M180 838 L192 850 L216 826" fill="none" stroke="#120f16" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <foreignObject x="225" y="808" width="1110" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#ffffff;font: 600 25px Arial, sans-serif; line-height:1.45;">
      I agree to receive conversational SMS from Northern Step Studio about my inquiry, setup review,
      onboarding, or support request.
    </div>
  </foreignObject>

  <foreignObject x="225" y="870" width="1110" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#cfc6d4;font: 21px Arial, sans-serif; line-height:1.45;">
      Message frequency varies. Message and data rates may apply. Reply STOP to opt out and HELP for help.
      Consent is not a condition of purchase. Privacy Policy: northernstepstudio.com/privacy
      Terms of Service: northernstepstudio.com/terms
    </div>
  </foreignObject>

  <text x="120" y="1000" fill="#7de5b6" font-family="Arial, sans-serif" font-size="26" font-weight="700">Opt-in type: Website / contact form checkbox</text>
  <text x="120" y="1038" fill="#cfc6d4" font-family="Arial, sans-serif" font-size="22">Public URL: https://northernstepstudio.com/contact</text>
</svg>
