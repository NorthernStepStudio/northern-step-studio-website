services:
  responseos-gateway:
    build:
      context: ../..
      dockerfile: "apps/NSS Missed Call Text Back/Dockerfile"
    container_name: responseos-gateway
    env_file:
      - .env.hosted
    ports:
      - "8787:8787"
    volumes:
      - ./server-data:/workspace/apps/nss-missed-call-ai/server-data
    restart: unless-stopped
