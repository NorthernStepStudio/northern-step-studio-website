<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Northern Step Studio SMS samples</title>
  <desc id="desc">Sample consent confirmation and help messaging for Northern Step Studio service automation inquiries.</desc>
  <rect width="1600" height="1100" fill="#120f16"/>
  <rect x="60" y="60" width="1480" height="980" rx="36" fill="#1d1821" stroke="#3d3345" stroke-width="4"/>
  <text x="120" y="155" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="700">Northern Step Studio</text>
  <text x="120" y="210" fill="#ff8f5a" font-family="Arial, sans-serif" font-size="28" font-weight="700">SMS Program Samples for Toll-Free Verification</text>

  <rect x="140" y="290" width="1320" height="240" rx="28" fill="#241d2a" stroke="#45394f" stroke-width="3"/>
  <text x="190" y="355" fill="#7de5b6" font-family="Arial, sans-serif" font-size="30" font-weight="700">Production message sample</text>
  <foreignObject x="190" y="385" width="1220" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#ffffff;font: 26px Arial, sans-serif; line-height:1.5;">
      Northern Step Studio: Thanks for reaching out. We can text you about your inquiry, setup review,
      onboarding, or support request. Message frequency varies. Message and data rates may apply.
      Reply STOP to opt out and HELP for help.
    </div>
  </foreignObject>

  <rect x="140" y="580" width="1320" height="180" rx="28" fill="#241d2a" stroke="#45394f" stroke-width="3"/>
  <text x="190" y="645" fill="#7de5b6" font-family="Arial, sans-serif" font-size="30" font-weight="700">HELP response sample</text>
  <foreignObject x="190" y="675" width="1220" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#ffffff;font: 26px Arial, sans-serif; line-height:1.5;">
      Northern Step Studio: Help for product inquiries and service automation requests. Reply STOP to opt out or email hello@northernstepstudio.com.
    </div>
  </foreignObject>

  <rect x="140" y="800" width="1320" height="160" rx="28" fill="#241d2a" stroke="#45394f" stroke-width="3"/>
  <text x="190" y="865" fill="#7de5b6" font-family="Arial, sans-serif" font-size="30" font-weight="700">Opt-in confirmation sample</text>
  <foreignObject x="190" y="895" width="1220" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#ffffff;font: 26px Arial, sans-serif; line-height:1.5;">
      Northern Step Studio: We received your request and your SMS follow-up preference. We will text you about this inquiry only.
    </div>
  </foreignObject>

  <text x="120" y="1010" fill="#cfc6d4" font-family="Arial, sans-serif" font-size="22">Program details: https://northernstepstudio.com/contact • https://northernstepstudio.com/privacy • https://northernstepstudio.com/terms</text>
</svg>
