version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexusbuild_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexusbuild
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nexusbuild"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: nexusbuild_api
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/nexusbuild
      NODE_ENV: development
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm --workspace apps/backend run dev"

  reco:
    build:
      context: ./apps/reco
      dockerfile: Dockerfile
    container_name: nexusbuild_reco
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
    volumes:
      - ./apps/reco:/app
      - /app/node_modules

  web:
    image: node:20-alpine
    container_name: nexusbuild_web
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - api
    command: sh -c "npm install && npm --workspace apps/web run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
