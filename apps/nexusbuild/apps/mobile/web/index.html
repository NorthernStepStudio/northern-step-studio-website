<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>NexusBuild</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0a0f1e;
        overflow: hidden;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* Loading screen styling */
      .expo-loading-screen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        background-color: #0a0f1e;
      }
      .expo-loading-screen-logo {
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 20px;
        letter-spacing: -1px;
      }
      .expo-loading-screen-logo-nexus {
        color: #FFFFFF;
      }
      .expo-loading-screen-logo-build {
        color: #00E5FF;
      }
      .expo-loading-screen-text {
        color: #94A3B8;
        font-size: 14px;
        margin-top: 10px;
      }
      .expo-loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 229, 255, 0.3);
        border-top-color: #00E5FF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-top: 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This will be replaced by React app -->
      <div class="expo-loading-screen">
        <div class="expo-loading-screen-logo">
          <span class="expo-loading-screen-logo-nexus">Nexus</span><span class="expo-loading-screen-logo-build">Build</span>
        </div>
        <div class="expo-loading-spinner"></div>
        <div class="expo-loading-screen-text">Loading your PC building companion...</div>
      </div>
    </div>
    <script>
      // This makes React Native's fast-refresh work over HTTPS
      if (window.location.protocol === 'https:') {
        const ws = window.location.host.replace(/^.*:/, 'ws://localhost:');
        window.__REACT_DEVTOOLS_GLOBAL_HOOK__ = { isDisabled: false };
      }
    </script>
  </body>
</html>
