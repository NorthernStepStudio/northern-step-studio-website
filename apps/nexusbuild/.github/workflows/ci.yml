name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: nexusbuild-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-verification:
    name: Static Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm --workspace apps/backend run prisma:generate

      - name: Build backend
        run: npm --workspace apps/backend run build

      - name: Test backend
        run: npm --workspace apps/backend test

      - name: Verify web bundles
        run: node ./scripts/verify.mjs web web-amazon

      - name: Test mobile
        run: npm --workspace apps/mobile test

      - name: Export mobile web bundle
        working-directory: apps/mobile
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
        run: npx expo export --platform web

      - name: Check eBay API syntax
        run: |
          node --check apps/ebay-api/src/server.js
          node --check apps/ebay-api/src/ebay.js

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nexusbuild
          POSTGRES_USER: nexusbuild
          POSTGRES_PASSWORD: nexusbuild_ci_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexusbuild -d nexusbuild"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nexusbuild:nexusbuild_ci_pw@127.0.0.1:5432/nexusbuild?schema=public
      JWT_SECRET: nexusbuild-ci-secret
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 30d
      PORT: 3000
      NODE_ENV: test
      FRONTEND_URL: http://127.0.0.1:5173
      MOBILE_URL: http://127.0.0.1:8081
      ADMIN_EMAIL: admin@nexusbuild.app
      NEXUSBUILD_ADMIN_USERNAME: NexusBuildCI
      NEXUSBUILD_ADMIN_PASSWORD: NexusBuildCIAdmin123!
      NEXUSBUILD_SMOKE_ADMIN_EMAIL: admin@nexusbuild.app
      NEXUSBUILD_SMOKE_ADMIN_PASSWORD: NexusBuildCIAdmin123!
      NEXUSBUILD_SMOKE_CLEANUP: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm --workspace apps/backend run prisma:generate

      - name: Apply database migrations
        run: npm --workspace apps/backend run migrate

      - name: Build backend
        run: npm --workspace apps/backend run build

      - name: Seed admin account
        run: npm --workspace apps/backend run seed:admin

      - name: Start backend
        run: |
          nohup npm --workspace apps/backend run start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Run live smoke suite
        run: node ./scripts/smoke-backend.mjs --base-url http://127.0.0.1:3000/api

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
