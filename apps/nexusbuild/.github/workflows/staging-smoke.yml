name: Staging Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: API base URL including /api. Leave blank to use the staging secret.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Staging Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Resolve staging target
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
          SECRET_BASE_URL: ${{ secrets.NEXUSBUILD_STAGING_BASE_URL }}
        run: |
          BASE_URL="${INPUT_BASE_URL}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="${SECRET_BASE_URL}"
          fi
          if [ -z "$BASE_URL" ]; then
            echo "Missing staging base URL. Set the workflow input or the NEXUSBUILD_STAGING_BASE_URL secret."
            exit 1
          fi
          echo "NEXUSBUILD_SMOKE_BASE_URL=${BASE_URL%/}" >> "$GITHUB_ENV"

      - name: Check staging health
        run: curl --fail --show-error --silent "${NEXUSBUILD_SMOKE_BASE_URL}/health"

      - name: Run staging smoke suite
        env:
          NEXUSBUILD_SMOKE_ADMIN_EMAIL: ${{ secrets.NEXUSBUILD_STAGING_ADMIN_EMAIL }}
          NEXUSBUILD_SMOKE_ADMIN_PASSWORD: ${{ secrets.NEXUSBUILD_STAGING_ADMIN_PASSWORD }}
          NEXUSBUILD_SMOKE_CLEANUP: "true"
        run: node ./scripts/smoke-backend.mjs
